[package]
name = "weirdns"
version = "1.0.0"
edition = "2024"
description = "DNS64 gateway proxy"

[dependencies]
hickory-proto = { version = "0.26", default-features = false, features = ["std"] }
tokio = { version = "1", features = ["io-util", "net", "rt-multi-thread", "time", "macros"] }
toml = "0.8"
serde = { version = "1", features = ["derive"] }


[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
